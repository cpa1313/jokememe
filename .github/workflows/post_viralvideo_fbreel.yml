name: 🎬 Meme Reel Poster — Relationship Edition

on:
  schedule:
    # Runs every day at 10:00 AM UTC — change to your preferred time
    - cron: "0 10 * * *"
  workflow_dispatch:   # also lets you trigger manually from the Actions tab

jobs:
  post-reel:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo (includes assets/videos) ─────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install FFmpeg ──────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install groq requests Pillow

      # ── 5. Create output directory ─────────────────────────────────────────
      - name: Prepare output folder
        run: mkdir -p output

      # ── 6. Run the meme reel maker ─────────────────────────────────────────
      - name: Generate & post reel
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
        run: python viralvideo_maker.py

      # ── 7. Upload rendered video as build artifact (optional) ──────────────
      - name: Upload rendered video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-${{ github.run_number }}
          path: output/reel.mp4
          retention-days: 7
